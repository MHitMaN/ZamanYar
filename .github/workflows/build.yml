name: Build Browser Extensions

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update, for example v1.0.0. Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Validate manifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('manifest ok')"

      - name: JavaScript syntax check
        run: |
          node --check src/background/background.js
          node --check src/content/jalaali.js
          node --check src/content/content.js
          node --check src/options/options.js
          node --check src/popup/popup.js
          node --check src/shared/i18n.js
          node --check docs/demo.js

      - name: Validate language files
        run: |
          node -e "const fs=require('fs'); for (const f of ['Languages/fa.json','Languages/ur.json','Languages/ar.json','Languages/en.json']) JSON.parse(fs.readFileSync(f,'utf8')); console.log('languages ok')"

      - name: Prepare extension source
        run: |
          rm -rf dist
          mkdir -p dist/source
          cp manifest.json LICENSE dist/source/
          cp -R src assets Languages dist/source/

      - name: Prepare Firefox source
        run: |
          cp -R dist/source dist/firefox-source
          node - <<'NODE'
          const fs = require('fs');
          const manifestPath = 'dist/firefox-source/manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          manifest.background = {
            scripts: [manifest.background.service_worker]
          };
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Firefox lint
        run: npx web-ext lint --source-dir dist/firefox-source

      - name: Build Firefox package
        run: |
          npx web-ext build --source-dir dist/firefox-source --artifacts-dir dist/firefox --overwrite-dest
          cp dist/firefox/*.zip dist/firefox/zamanyar-firefox.zip

      - name: Build Chrome package
        run: |
          mkdir -p dist/chrome
          cd dist/source
          zip -r ../chrome/zamanyar-chrome.zip .

      - name: Build Edge package
        run: |
          mkdir -p dist/edge
          cp dist/chrome/zamanyar-chrome.zip dist/edge/zamanyar-edge.zip

      - name: Build Brave package
        run: |
          mkdir -p dist/brave
          cp dist/chrome/zamanyar-chrome.zip dist/brave/zamanyar-brave.zip

  safari:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare extension source
        run: |
          rm -rf dist
          mkdir -p dist/source
          cp manifest.json LICENSE dist/source/
          cp -R src assets Languages dist/source/

      - name: Build Safari source package
        run: |
          mkdir -p dist/safari
          cd dist/source
          zip -r ../safari/zamanyar-safari-source.zip .

      - name: Convert to Safari Xcode project
        run: |
          xcrun safari-web-extension-converter dist/source \
            --project-location dist/safari \
            --app-name "ZamanYar" \
            --bundle-identifier "com.mhitman.zamanyar" \
            --macos-only \
            --no-open \
            --no-prompt \
            --force

  release:
    runs-on: macos-latest
    needs:
      - build
      - safari
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve release tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      - name: Prepare extension source
        run: |
          rm -rf dist
          mkdir -p dist/source
          cp manifest.json LICENSE dist/source/
          cp -R src assets Languages dist/source/

      - name: Prepare Firefox source
        run: |
          cp -R dist/source dist/firefox-source
          node - <<'NODE'
          const fs = require('fs');
          const manifestPath = 'dist/firefox-source/manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          manifest.background = {
            scripts: [manifest.background.service_worker]
          };
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Build Firefox package
        run: |
          npx web-ext build --source-dir dist/firefox-source --artifacts-dir dist/firefox --overwrite-dest
          cp dist/firefox/*.zip dist/firefox/zamanyar-firefox.zip

      - name: Build Chrome package
        run: |
          mkdir -p dist/chrome
          cd dist/source
          zip -r ../chrome/zamanyar-chrome.zip .

      - name: Build Edge package
        run: |
          mkdir -p dist/edge
          cp dist/chrome/zamanyar-chrome.zip dist/edge/zamanyar-edge.zip

      - name: Build Brave package
        run: |
          mkdir -p dist/brave
          cp dist/chrome/zamanyar-chrome.zip dist/brave/zamanyar-brave.zip

      - name: Build Safari source package
        run: |
          mkdir -p dist/safari
          cd dist/source
          zip -r ../safari/zamanyar-safari-source.zip .

      - name: Convert to Safari Xcode project
        run: |
          xcrun safari-web-extension-converter dist/source \
            --project-location dist/safari \
            --app-name "ZamanYar" \
            --bundle-identifier "com.mhitman.zamanyar" \
            --macos-only \
            --no-open \
            --no-prompt \
            --force

      - name: List release assets
        run: find dist -type f -name '*.zip' -print

      - name: Attach builds to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            dist/chrome/zamanyar-chrome.zip
            dist/firefox/zamanyar-firefox.zip
            dist/edge/zamanyar-edge.zip
            dist/brave/zamanyar-brave.zip
            dist/safari/zamanyar-safari-source.zip
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
